name: Build & Release

on:
  workflow_dispatch: # Allows you to manually trigger the build from GitHub Actions tab
  push:
    tags:
      - 'v*' # Automatically triggers when you push a version tag like 'v1.0.0'

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Inject Secrets
        env:
          FIREBASE_OPTIONS: ${{ secrets.FIREBASE_OPTIONS_DART }}
          GOOGLE_SERVICES: ${{ secrets.GOOGLE_SERVICES_JSON }}
          GROQ_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          # Inject Firebase config safely via environment variables
          echo "$FIREBASE_OPTIONS" > lib/firebase_options.dart
          echo "$GOOGLE_SERVICES" > android/app/google-services.json
          
          # Clean up any accidental newlines in the Groq key
          CLEAN_GROQ_KEY=$(echo "$GROQ_KEY" | tr -d '\n\r')
          
          # Inject Groq API Key safely
          sed -i '' "s/YOUR_GROQ_API_KEY_HERE/${CLEAN_GROQ_KEY}/g" lib/services/groq_service.dart

      - name: Install Dependencies
        run: flutter pub get

      - name: Build iOS (Unsigned)
        run: flutter build ios --release --no-codesign

      - name: Package iOS into IPA
        run: |
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r StudyZen-iOS.ipa Payload
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: StudyZen-iOS-IPA
          path: StudyZen-iOS.ipa
